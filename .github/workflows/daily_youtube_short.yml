name: Daily YouTube Short Upload

on:
  schedule:
    - cron: "30 13 * * *" # 7:00 PM Asia/Kolkata
  workflow_dispatch:

jobs:
  upload-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run uploader
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_PRIVACY_STATUS: public
          CREATOR_QUERIES: MrBeast,IShowSpeed,KSI,PewDiePie,Sidemen,Mark Rober,Dude Perfect
          SEARCH_RESULTS_PER_QUERY: "8"
          EXTRA_HASHTAGS: "#Shorts,#YouTubeShorts,#Viral"
          PERMISSIONED_CHANNELS: ""
        run: python scripts/daily_short_uploader.py

      - name: Upload run report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-short-run-report
          path: |
            run_report.json
            output_short.mp4
          if-no-files-found: ignore
